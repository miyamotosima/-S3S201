<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー情報登録</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>

  <div class="app-container register-screen">

    <main class="form-container">
      
      <h2 class="form-title">ユーザー情報登録</h2>

      <form action="register.php" method="POST">
        
        <div class="form-group">
          <label class="form-label">
            ユーザー名<span class="required">*</span>
            <span class="error-msg">エラーメッセージの表示</span>
          </label>
          <input type="text" name="username" class="form-control text-input" value="田中 ぴく太郎" required>
        </div>

        <div class="form-group">
          <label class="form-label">地域</label>
          <div class="location-group">
            
            <div class="select-wrapper">
              <select name="prefecture" class="form-control select-input">
                <option value="">選択してください</option>
                <option value="北海道">北海道</option>
                <option value="青森県">青森県</option>
                <option value="岩手県">岩手県</option>
                <option value="宮城県">宮城県</option>
                <option value="秋田県">秋田県</option>
                <option value="山形県">山形県</option>
                <option value="福島県">福島県</option>
                <option value="茨城県">茨城県</option>
                <option value="栃木県">栃木県</option>
                <option value="群馬県">群馬県</option>
                <option value="埼玉県">埼玉県</option>
                <option value="千葉県">千葉県</option>
                <option value="東京都">東京都</option>
                <option value="神奈川県">神奈川県</option>
                <option value="新潟県">新潟県</option>
                <option value="富山県">富山県</option>
                <option value="石川県">石川県</option>
                <option value="福井県">福井県</option>
                <option value="山梨県">山梨県</option>
                <option value="長野県">長野県</option>
                <option value="岐阜県">岐阜県</option>
                <option value="静岡県">静岡県</option>
                <option value="愛知県">愛知県</option>
                <option value="三重県">三重県</option>
                <option value="滋賀県">滋賀県</option>
                <option value="京都府">京都府</option>
                <option value="大阪府">大阪府</option>
                <option value="兵庫県">兵庫県</option>
                <option value="奈良県">奈良県</option>
                <option value="和歌山県">和歌山県</option>
                <option value="鳥取県">鳥取県</option>
                <option value="島根県">島根県</option>
                <option value="岡山県">岡山県</option>
                <option value="広島県">広島県</option>
                <option value="山口県">山口県</option>
                <option value="徳島県">徳島県</option>
                <option value="香川県">香川県</option>
                <option value="愛媛県">愛媛県</option>
                <option value="高知県">高知県</option>
                <option value="福岡県">福岡県</option>
                <option value="佐賀県">佐賀県</option>
                <option value="長崎県">長崎県</option>
                <option value="熊本県">熊本県</option>
                <option value="大分県">大分県</option>
                <option value="宮崎県">宮崎県</option>
                <option value="鹿児島県">鹿児島県</option>
                <option value="沖縄県">沖縄県</option>
              </select>
            </div>
             <span class="unit-text">都道府県</span>
            
            <input type="text" name="city" class="form-control city-input" placeholder="〇〇市">
            <span class="unit-text">市</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">生年月日</label>
          <input type="date" name="birthday" class="form-control text-input short-input" value="2005-09-06" required>
        </div>

        <div class="form-group">
          <label class="form-label">性別</label>
          <div class="radio-group">
            <label class="radio-label">
              <span>男</span>
              <input type="radio" name="gender" value="男" checked>
              <span class="custom-radio"></span>
            </label>
            <label class="radio-label">
              <span>女</span>
              <input type="radio" name="gender" value="女">
              <span class="custom-radio"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">職業</label>
          <div class="select-wrapper full-width">
            <select name="work" class="form-control select-input">
              <option value="学生">学生</option>
              <option value="会社員">会社員</option>
              <option value="主婦・主夫">主婦・主夫</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div class="button-group">
          <a href="index.html" class="btn btn-back">戻る</a>
          <button type="submit" class="btn btn-submit">登録</button>
        </div>

      </form>
    </main>

  </div>

</body>
</html>
