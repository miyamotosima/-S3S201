<script>
    function deleteItem(button) {
      if (confirm("このアイテムをリストから削除しますか？")) {
        // ボタンの親要素である「行（.item-row）」を取得
        const row = button.closest('.item-row');
        
        // 文字と元のボタンをフワッと消すアニメーション用のクラスをつける
        row.classList.add('fade-out-text');
        
        // アニメーションが終わる0.3秒後の処理
        setTimeout(() => {
          // 1. 中身（文字やボタン）を完全に消去して空っぽにする
          row.innerHTML = '';
          
          // 2. この行のスタイルを、他の空行と同じ「中央寄せ（empty-row）」に変える
          row.classList.add('empty-row');
          
          // 3. 新しいプラスボタンのHTMLを作る
          const plusButton = document.createElement('button');
          plusButton.className = 'add-row-btn';
          plusButton.innerHTML = '<i class="fa-solid fa-circle-plus"></i>';
          
          // 最初は透明にしておいて、フワッと出す準備をする
          plusButton.style.opacity = '0';
          plusButton.style.transition = 'opacity 0.3s ease';
          
          // 4. 行の中にプラスボタンを合体させる
          row.appendChild(plusButton);
          
          // 5. 一瞬だけ時間を遅らせて、プラスボタンをフワッと表示させる
          setTimeout(() => {
            plusButton.style.opacity = '1';
          }, 10);
          
        }, 300);
      }
    }
  </script>
