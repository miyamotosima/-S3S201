<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ</title>
  <link rel="stylesheet" href="css/mypage.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="app-container mypage-screen">
    
    <header class="mypage-header">
      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <h1>マイページ</h1>
    </header>

    <main class="mypage-content">
      
      <div class="avatar-area">
        <div class="avatar-circle">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <div class="edit-btn-wrap">
        <a href="edit_user.html" class="user-edit-btn">ユーザー情報編集</a>
      </div>

      <div class="profile-list">
        
        <div class="profile-item">
          <div class="label">ユーザー名</div>
          <div class="value">田中 ぴく太郎</div>
        </div>

        <div class="profile-item">
          <div class="label">地域</div>
          <div class="value">〇県 〇市</div>
        </div>

        <div class="profile-item">
          <div class="label">年齢</div>
          <div class="value">20</div>
        </div>

        <div class="profile-item">
          <div class="label">性別</div>
          <div class="value">男</div>
        </div>

        <div class="profile-item">
          <div class="label">職業</div>
          <div class="value">学生</div>
        </div>

      </div>

    </main>

    <div class="scrollbar-indicator">
      <div class="arrow-up">▲</div>
      <div class="bar-line"></div>
      <div class="arrow-down">▼</div>
    </div>

    <nav class="footer-nav">
      <a href="index.html" class="nav-item">
        <i class="fa-solid fa-house"></i>
        <span>ホーム</span>
      </a>
      <a href="belongings_list.html" class="nav-item">
        <i class="fa-solid fa-book-open"></i>
        <span>持ち物</span>
      </a>
      <a href="list_group.html" class="nav-item">
        <i class="fa-solid fa-list-check"></i>
        <span>リスト</span>
      </a>
      <a href="bag_list.html" class="nav-item">
        <i class="fa-solid fa-briefcase"></i>
        <span>バック</span>
      </a>
      <a href="history.html" class="nav-item">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>履歴</span>
      </a>
      <a href="mypage.html" class="nav-item active">
        <i class="fa-solid fa-user"></i>
        <span>マイページ</span>
      </a>
    </nav>

  </div>

</body>
</html>
